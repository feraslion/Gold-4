version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: gold4_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gold4_db
      POSTGRES_USER: gold4_user
      POSTGRES_PASSWORD: gold4_secure_pass
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold4_user -d gold4_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gold4_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: gold4_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://gold4_user:gold4_secure_pass@postgres:5432/gold4_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_in_production_very_long_secret_key
      PORT: 3000
      NODE_ENV: production
    ports: ["3000:3000"]

volumes:
  postgres_data:
  redis_data:
