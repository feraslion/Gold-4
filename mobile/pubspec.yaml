name: gold_4_mobile
description: تطبيق محاسبة احترافي — ليرة سورية ودولار أمريكي
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.5

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # DI
  get_it: 7.6.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^4.0.2

  # Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.0
  path_provider: ^2.0.15
  path: ^1.8.3

  # Localization — متوافق مع flutter_localizations Flutter 3.27
  intl: 0.18.0

  # UI Components
  font_awesome_flutter: ^10.7.0
  google_fonts: ^4.0.4
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.5.1

  # Charts — fl_chart (بديل charts_flutter المتوقف)
  fl_chart: ^0.62.0

  # PDF & Print
  pdf: ^3.10.4
  printing: ^5.11.0

  # QR & Barcode — mobile_scanner (بديل barcode_scan2)
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.0.0

  # Excel
  excel: ^4.0.6

  # Firebase — v3 (متوافق Flutter 3.27)
  firebase_core: ^2.13.1
  firebase_messaging: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.4
  mockito: ^5.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
