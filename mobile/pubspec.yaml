name: gold_4_mobile
description: تطبيق محاسبة احترافي — ليرة سورية ودولار أمريكي
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # DI
  get_it: ^7.7.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Localization
  intl: ^0.19.0

  # UI Components
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.5.1

  # Charts
  fl_chart: ^0.69.0

  # PDF & Print
  pdf: ^3.11.1
  printing: ^5.13.2

  # QR & Barcode
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Excel
  excel: ^4.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
