name: gold_4_mobile
description: A professional accounting application with SYP and USD support.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  intl: ^0.18.1
  dio: ^5.3.3
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  charts_flutter: ^0.12.0
  pdf: ^3.10.7
  printing: ^5.11.1
  barcode_scan2: ^4.2.4
  qr_flutter: ^4.1.0
  excel: ^2.1.0
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  very_good_analysis: ^5.1.0
  mocktail: ^1.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
